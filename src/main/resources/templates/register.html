<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>LOL FM - JOIN</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">
    <h2>JOIN THE LEAGUE</h2>

    <div th:if="${errorMessage}" class="error-msg" style="color: #ff4d4d; text-align: center; margin-bottom: 15px;">
        <p th:text="${errorMessage}"></p>
    </div>

    <form th:action="@{/register}" th:object="${userDto}" method="post">
        <div class="form-group">
            <label for="username">USERNAME</label>
            <input type="text" id="username" th:field="*{username}" placeholder="사용할 아이디를 입력하세요" required>
        </div>

        <div class="form-group">
            <label for="password">PASSWORD</label>
            <input type="password" id="password" th:field="*{password}" placeholder="비밀번호를 입력하세요" required>
        </div>

        <div class="form-group">
            <label for="passwordConfirm">CONFIRM PASSWORD</label>
            <input type="password" id="passwordConfirm" th:field="*{passwordConfirm}" placeholder="비밀번호를 다시 입력하세요" required>
        </div>

        <button type="submit" class="btn-submit">CREATE ACCOUNT</button>
        <div style="text-align: center; margin-top: 15px;">
            <a th:href="@{/login}" style="color: #bbb; text-decoration: none; font-size: 0.9em;">이미 계정이 있으신가요? 로그인하기</a>
        </div>
    </form>
</div>

</body>
</html>
